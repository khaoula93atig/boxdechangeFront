<div class="col-lg-12 grid-margin stretch-card">
  <div class="card" >
    <div class="card-body">
      <h4 class="card-title" style="font-size: 30px;
      margin-bottom: 35px;">Mes Enchères</h4>

      <div class="table-responsive table-enchere">
        <table class="table table-striped ">
          <thead>
            <tr>
              <th> Reférence </th>
              <th> Devise</th>
              <th> Montant</th>
              <th> Date de l'enchère</th>
              <th> </th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let Enchere of listenchere;let index=index">
              <td>
                {{Enchere.referenceEnchere }} </td>

              <td>
                <div style="display: inline-flex;  font-weight: 700;">
                  <div>{{Enchere.devise }}</div>

                </div>
              </td>




              <td>
                <div style="display: inline-flex;">
                  <div>{{Enchere.montantEnchere }}</div>

                </div>
              </td>


              <td>
                <div style="display: inline-flex;">
                  <div>{{Enchere.date | date:'dd-MM-yyyy' }}</div>

                </div>
              </td>
              <td>
                <div class="row">
                  <div class="col-sm-6">
                    <button type="button" class="btn btn-primary" (click)="openPopup();getbyindex(index)"
                      style="background-color: #364490; border-color: #364490; font-weight: 500;">
                      Liste des propositions</button>
                  </div>


                </div>
              </td>
            </tr>





          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>


<!-- Popup  == liste des propositions-->
<div class="modal" tabindex="-1" role="dialog" [ngStyle]="{'display':displayStyle}">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title" style="color: #364490;">Liste des propositions</h4>
      </div>

      <div class="modal-body">
        <div class="card-modal">
          <div class=" card-modal-body">

            <div class="table-responsive">

              <table class="table table-striped" matSort>
                <thead>
                  <tr>
                    <th mat-sort-header="banque"> Banque </th>
                    <th mat-sort-header="taux"> Taux</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let proposition of propositionsForSelectedEnchere | sort: 'taux_soumission'; let index = index">
                    <td style="color: #727898; text-transform: uppercase; font-weight: 600; font-size: 13px;">
                      {{ proposition.user.banque }}
                    </td>
                    <td style="font-weight: 700; text-align: center;">
                      {{ proposition.taux_soumission }}
                    </td>
                  </tr>
                  
                </tbody>
              </table>
              
            </div>



          </div>
        </div>

      </div>


      <div class="modal-footer">
        <button type="button" class="btn btn-danger" (click)="closePopup()">
          Fermer
        </button>
      </div>
    </div>
  </div>
</div>
